services:
  app:
    build: .
    container_name: reminderbot_app
    working_dir: /usr/src/app
    env_file:
      - .env
    environment:
      TZ: "Asia/Tokyo"
    volumes:
      - .:/usr/src/app
      - node_modules:/usr/src/app/node_modules
    ports:
      - "3000:3000"
    command: npm run start
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    container_name: reminderbot_db
    environment:
      POSTGRES_DB: reminderbot
      POSTGRES_USER: reminder_user
      POSTGRES_PASSWORD: reminder_password
      TZ: "Asia/Tokyo"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U reminder_user -d reminderbot
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  node_modules:
  postgres_data: